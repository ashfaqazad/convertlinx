<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A"/>
      <stop offset="100%" style="stop-color:#0D1F3C"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF"/>
      <stop offset="100%" style="stop-color:#0072FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <g clip-path="url(#circleClip)" opacity="0.07">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#00C6FF" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#00C6FF" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#00C6FF" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#00C6FF" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#00C6FF" stroke-width="1"/>
  </g>

  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.35"/>

  <path d="M 190 175 A 95 95 0 1 0 190 337" fill="none" stroke="url(#accentGrad)" stroke-width="38" stroke-linecap="round" filter="url(#glow)"/>

  <line x1="295" y1="178" x2="385" y2="334" stroke="white" stroke-width="34" stroke-linecap="round" opacity="0.95"/>
  <line x1="295" y1="334" x2="385" y2="178" stroke="white" stroke-width="34" stroke-linecap="round" opacity="0.95"/>

  <circle cx="256" cy="256" r="12" fill="url(#accentGrad)" filter="url(#glow)"/>

  <path id="bottomArc" d="M 95 330 A 185 185 0 0 0 417 330" fill="none"/>
  <text font-size="36" fill="white" opacity="0.55" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" letter-spacing="8">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">CONVERTLINX</textPath>
  </text>
</svg>